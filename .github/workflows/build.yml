name: Build Server
run-name: "${{ inputs.commit_message || 'Manual build' }}"

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Run title"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-server:
    name: Build nqserver (ARM64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prefetch upstream WinQuake
        run: |
          mkdir -p src/build/tmp
          FETCH_ONLY=1 UPSTREAM_QUAKE_DIR=src/build/tmp \
            bash vendor/NexQuake/build/prepare-upstream.sh server
          test -d src/build/tmp/WinQuake

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server in Wolfi container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --target server-artifact \
            --output "type=local,dest=src/build/tmp/server-artifact" \
            -f src/Dockerfile .
          mkdir -p src/build/tmp/bin
          cp src/build/tmp/server-artifact/nqserver src/build/tmp/bin/nqserver
          chmod +x src/build/tmp/bin/nqserver
          file src/build/tmp/bin/nqserver
          ls -lh src/build/tmp/bin/nqserver

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqserver-arm64.zip
          path: src/build/tmp/bin/nqserver
          retention-days: 7
